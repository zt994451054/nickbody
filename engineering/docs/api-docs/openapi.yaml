# 已发布 API 文档（OpenAPI 规范）
#
# 用途：记录已正式发布上线的 API 接口（基线），供前端集成和外部调用方参考
# 填写时机：
#   - 已有产品迁移：SOP-09 阶段 3.5 首次填充（不等到首版发布）
#   - 新产品日常：每次版本发布时（SOP-07 推进到「已发布」），把版本内 api-design.md
#     的已上线接口合入本文件
# 数据来源：versions/{ver}/engineering/api-design.md（版本内设计稿）
#
# 格式：OpenAPI 3.0 (YAML)
# 文档：https://swagger.io/specification/
#
# 初始状态：新产品首版发布前此文件为空；已有产品迁移时应首次填充全量已上线接口
